<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register · Nepal E-Governance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-wrap">
    <div class="card auth-card animate-in">

        <div class="auth-header">
            <h2 class="auth-title">🔐 Create Admin</h2>
            <p class="auth-subtitle">Restricted system setup</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div style="
            background: var(--red-muted);
            border: 0.5px solid rgba(185,28,28,.25);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: .82rem;
            color: var(--red-text);
            margin-bottom: 18px;">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" autocomplete="new-password" required>
            </div>

            <button type="submit" class="btn btn-danger btn-block mt-3">
                Create Admin 👑
            </button>

            <p style="margin-top:10px; font-size:.75rem; color:var(--text-low); text-align:center;">
                Only one administrator account is allowed. Unauthorized creation attempts may be logged.
            </p>

        </form>

        <p style="margin-top:12px; text-align:center;">
            <a href="/admin-login" class="auth-link">← Back to Admin Login</a>
        </p>

    </div>
</div>

</body>
</html>
