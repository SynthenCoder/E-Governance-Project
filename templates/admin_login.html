<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · Nepal E-Governance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="topnav">
    <div class="topnav-brand">
        <span class="topnav-flag">🇳🇵</span>
        <span class="topnav-name">E-Governance Nepal</span>
    </div>
    <div class="topnav-actions">
        <a href="/" class="btn btn-ghost btn-sm">Home</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="card auth-card animate-in">

        <div class="auth-header">
            <h1 class="auth-title">🔒 Admin Access</h1>
            <p class="auth-subtitle">Restricted system control panel</p>
        </div>

        <!-- FLASH MESSAGE -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div style="background:var(--red-muted);
                    border:0.5px solid rgba(185,28,28,.25);
                    border-radius:var(--radius-sm);
                    padding:10px 14px;
                    font-size:.82rem;
                    color:var(--red-text);
                    margin-bottom:18px;">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <!-- FORM -->
        <form method="POST">

            <div class="form-group">
                <label class="form-label">Username</label>
                <input 
                    class="form-input" 
                    type="text" 
                    name="username" 
                    placeholder="Admin username"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input 
                    class="form-input" 
                    type="password" 
                    name="password" 
                    placeholder="Admin password"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-danger btn-lg btn-block mt-4">
                Login as Admin
            </button>

            <!-- SECURITY MESSAGE -->
            <p style="margin-top:12px; font-size:.75rem; color:var(--text-low); text-align:center;">
                Unauthorized access is strictly prohibited and may be subject to legal action.
            </p>

        </form>

        <!-- FOOTER -->
        <div style="margin-top:18px; text-align:center; font-size:.85rem; color:var(--text-mid);">
            <p>
                Not an admin?
                <a href="/login" class="auth-link">Back to user login</a>
            </p>
        </div>

    </div>
</div>

</body>
</html>
